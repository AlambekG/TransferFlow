services:
  postgres:
    image: postgres:16
    container_name: transferflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transferflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build: .
    container_name: transferflow-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/transferflow
    depends_on:
      - postgres
    volumes:
      - .:/app
  redis:
    image: redis:7
    container_name: transferflow-redis
    ports:
      - "6379:6379"
volumes:
  postgres_data: